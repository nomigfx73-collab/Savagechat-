<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SavageChat | Social</title>
    <style>
        :root { --accent: #00d4ff; --dark: #0b1014; --card: #1c2229; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        .hidden { display: none !important; }
        
        .header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        
        /* Post Style */
        .post { background: var(--card); border-radius: 15px; margin: 15px; overflow: hidden; border: 1px solid #333; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; }
        .post-user-img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--accent); }
        .post-img { width: 100%; height: auto; display: block; }
        .post-actions { padding: 12px; display: flex; gap: 20px; border-top: 1px solid #2a323d; }
        .action-btn { background: none; border: none; color: #888; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .action-btn.active { color: var(--accent); }
        .post-desc { padding: 0 12px 12px 12px; font-size: 14px; color: #ccc; }

        /* Comment Section */
        .comment-box { padding: 10px 12px; background: #12181f; border-top: 1px solid #2a323d; display: none; }
        .comment-box.show { display: block; }
        .comment-input { width: 100%; background: none; border: 1px solid #333; color: white; padding: 8px; border-radius: 15px; font-size: 12px; margin-bottom: 5px; }

        /* Footer Nav */
        .footer { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .tab { color: #888; text-align: center; font-size: 11px; cursor: pointer; }
        .tab.active { color: var(--accent); }
    </style>
</head>
<body onload="initApp()">

    <div class="header">
        <span id="tab-title" style="font-weight:bold; letter-spacing:1px;">SAVAGE FEED</span>
        <div style="color:#ffaa00; font-weight:bold;">🪙 <span id="user-coins">500</span></div>
    </div>

    <div id="feed-tab">
        <div class="post">
            <div class="post-header">
                <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=100" class="post-user-img">
                <div><b>Zoya AI</b><br><small style="color:#888;">Just now</small></div>
            </div>
            <div class="post-desc">Feeling savage today! Who wants to chat? 🔥</div>
            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=600" class="post-img">
            <div class="post-actions">
                <button class="action-btn" onclick="toggleLike(this)">👍 <span>12</span> Likes</button>
                <button class="action-btn" onclick="toggleComment(1)">💬 Comment</button>
            </div>
            <div id="comment-1" class="comment-box">
                <div style="font-size:12px; color:#888; margin-bottom:5px;"><b>Nomi:</b> Wow, looking great!</div>
                <input type="text" class="comment-input" placeholder="Write a comment..." onkeypress="addComment(event, 1)">
            </div>
        </div>

        <div class="post">
            <div class="post-header">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100" class="post-user-img">
                <div><b>Aliza Khan</b><br><small style="color:#888;">2 hours ago</small></div>
            </div>
            <div class="post-desc">Weekend vibes! 👑✨</div>
            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=600" class="post-img">
            <div class="post-actions">
                <button class="action-btn" onclick="toggleLike(this)">👍 <span>45</span> Likes</button>
                <button class="action-btn" onclick="toggleComment(2)">💬 Comment</button>
            </div>
            <div id="comment-2" class="comment-box">
                <input type="text" class="comment-input" placeholder="Write a comment..." onkeypress="addComment(event, 2)">
            </div>
        </div>
    </div>

    <div id="profile-tab" class="hidden" style="text-align:center; padding:30px;">
        <div style="width:100px; height:100px; background:var(--accent); border-radius:50%; margin:0 auto; line-height:100px; font-size:40px; color:black;">👤</div>
        <h2 id="display-name">Noman</h2>
        <p style="color:var(--accent);">Savage Leader 👑</p>
    </div>

    <div class="footer">
        <div class="tab active" id="b-feed" onclick="switchTab('feed')">📰<br>Feed</div>
        <div class="tab" id="b-profile" onclick="switchTab('profile')">👤<br>Account</div>
    </div>

    <script>
        function initApp() {
            const user = localStorage.getItem('s_user') || "Noman";
            document.getElementById('display-name').innerText = user;
            document.getElementById('user-coins').innerText = localStorage.getItem('s_coins') || 500;
        }

        function switchTab(t) {
            document.getElementById('feed-tab').classList.toggle('hidden', t !== 'feed');
            document.getElementById('profile-tab').classList.toggle('hidden', t !== 'profile');
            document.getElementById('tab-title').innerText = t === 'feed' ? "SAVAGE FEED" : "ACCOUNT";
            document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
            document.getElementById('b-'+t).classList.add('active');
        }

        function toggleLike(btn) {
            btn.classList.toggle('active');
            let span = btn.querySelector('span');
            let currentLikes = parseInt(span.innerText);
            span.innerText = btn.classList.contains('active') ? currentLikes + 1 : currentLikes - 1;
        }

        function toggleComment(id) {
            document.getElementById('comment-' + id).classList.toggle('show');
        }

        function addComment(e, id) {
            if(e.key === 'Enter' && e.target.value !== "") {
                const box = document.getElementById('comment-' + id);
                const newComment = document.createElement('div');
                newComment.style = "font-size:12px; color:#ccc; margin-bottom:5px;";
                newComment.innerHTML = `<b>Me:</b> ${e.target.value}`;
                box.insertBefore(newComment, e.target);
                e.target.value = "";
            }
        }
    </script>
</body>
</html>
