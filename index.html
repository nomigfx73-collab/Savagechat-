<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavageChat | Secure Login</title>
    <style>
        body { background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-container { background: #1c1f26; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 0 20px rgba(0,212,255,0.2); text-align: center; border: 1px solid #333; }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #0b0e14; color: white; box-sizing: border-box; }
        .btn-google { background: white; color: #555; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .btn-main { background: linear-gradient(90deg, #00d4ff, #0055ff); color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .restriction-text { font-size: 11px; color: #ff0055; margin-top: 15px; }
        #app-interface { display: none; width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="logo">SAVAGE CHAT AI</div>
        <p style="font-size: 14px; color: #aaa;">Join the world's first unrestricted AI community.</p>
        
        <button class="btn-google" onclick="googleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18"> Continue with Google
        </button>

        <div style="margin: 15px 0; color: #555;">OR</div>

        <input type="text" id="user-name" placeholder="Full Name">
        <input type="number" id="user-age" placeholder="Age (Must be 18+)">
        
        <select id="user-role">
            <option value="" disabled selected>Select Account Type</option>
            <option value="gifter">I want to Chat & Gift (Male)</option>
            <option value="earner">I want to Earn & Talk (Female)</option>
        </select>

        <button class="btn-main" onclick="validateAndEntry()">Create Account</button>

        <p class="restriction-text">⚠️ 18+ ONLY: By joining, you confirm you are of legal age. Fake profiles will be banned.</p>
    </div>

    <div id="app-interface">
        <h1 style="text-align:center; margin-top:50px;">Welcome to Savage Chat!</h1>
        <p id="welcome-msg" style="text-align:center;"></p>
    </div>

    <script>
        function googleLogin() {
            alert("Google Login Service is connecting... Please fill details manually for instant access.");
        }

        function validateAndEntry() {
            let name = document.getElementById('user-name').value;
            let age = document.getElementById('user-age').value;
            let role = document.getElementById('user-role').value;

            if(name == "" || age == "" || role == "") {
                alert("Please fill all details!");
                return;
            }

            if(age < 18) {
                alert("Access Denied! This app is only for 18+ users.");
                return;
            }

            // Success
            alert("Welcome " + name + "! Account created as " + role.toUpperCase());
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "Logged in as: " + name + " (" + role + ")";
            
            // Yahan hum dashboard load karwa sakte hain
        }
    </script>
</body>
</html>
