<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavageChat | Instant Access</title>
    <style>
        body { background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; }
        .hidden { display: none !important; }
        .nav { background: #1c1f26; padding: 15px; border-bottom: 2px solid #00d4ff; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        input, select, textarea { width: 90%; max-width: 300px; padding: 12px; margin: 10px auto; border-radius: 10px; background: #1c1f26; color: white; border: 1px solid #444; display: block; }
        .btn-action { background: #00d4ff; color: black; border: none; padding: 12px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; width: 90%; max-width: 300px; }
        
        /* Girl Profile Cards */
        .girl-card { background: #1c1f26; border-radius: 15px; margin: 15px; border: 1px solid #333; overflow: hidden; position: relative; }
        .girl-img { width: 100%; height: 250px; object-fit: cover; }
        .girl-info { padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
        .online-tag { background: #00ff44; color: black; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1c1f26; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
    </style>
</head>
<body onload="checkAutoLogin()">

    <div id="auth-screen" style="text-align:center; padding-top:60px;">
        <h2 style="color:#00d4ff;">SAVAGE CHAT</h2>
        <p style="font-size:12px; color:#888;">Login with Email to see who's online</p>
        <input type="email" id="uemail" placeholder="Email Address">
        <input type="password" id="upass" placeholder="Password">
        <input type="text" id="uname" placeholder="Your Name">
        <select id="urole">
            <option value="gifter">I am a Boy (Gifter)</option>
            <option value="earner">I am a Girl (Earner)</option>
        </select>
        <button class="btn-action" onclick="loginNow()">Login & Start</button>
    </div>

    <div id="app-screen" class="hidden">
        <div class="nav">
            <span id="name-tag" style="font-weight:bold; color:#00d4ff;"></span>
            <div style="background:#ffaa00; color:black; padding:4px 10px; border-radius:15px; font-size:12px; font-weight:bold;">🪙 0</div>
        </div>

        <div id="home-view">
            <h4 style="margin-left:15px; color:#aaa;">Lerkia Online Hain 🔥</h4>
            
            <div class="girl-card" onclick="alert('Starting Free Chat...')">
                <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=500" class="girl-img">
                <div class="girl-info">
                    <span class="online-tag">● ONLINE</span>
                    <h3 style="margin:5px 0;">Zoya AI</h3>
                    <p style="font-size:12px; color:#eee;">Let's chat! Main bore ho rahi hoon... ❤️</p>
                </div>
            </div>

            <div class="girl-card" onclick="alert('Starting Free Chat...')">
                <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=500" class="girl-img">
                <div class="girl-info">
                    <span class="online-tag">● ONLINE</span>
                    <h3 style="margin:5px 0;">Sara Malik</h3>
                    <p style="font-size:12px; color:#eee;">Privacy is my priority. Private chat? 😉</p>
                </div>
            </div>
        </div>

        <div id="profile-view" class="hidden" style="text-align:center; padding-top:50px;">
            <h3>My Profile</h3>
            <p id="display-email" style="color:#888;"></p>
            <button class="btn-action" style="background:#ff0055; color:white;" onclick="logout()">Logout Account</button>
        </div>

        <div class="bottom-nav">
            <div onclick="showPage('home')">🏠 Home</div>
            <div onclick="showPage('profile')">👤 Profile</div>
        </div>
    </div>

    <script>
        let currentUser = null;

        function checkAutoLogin() {
            const saved = localStorage.getItem('savageSession');
            if (saved) {
                currentUser = JSON.parse(saved);
                loadDashboard();
            }
        }

        function loginNow() {
            const email = document.getElementById('uemail').value;
            const name = document.getElementById('uname').value;
            const role = document.getElementById('urole').value;

            if(!email || !name) return alert("Please fill all details!");

            currentUser = { name: name, email: email, role: role };
            localStorage.setItem('savageSession', JSON.stringify(currentUser));
            loadDashboard();
        }

        function loadDashboard() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('name-tag').innerText = currentUser.name.toUpperCase();
            document.getElementById('display-email').innerText = currentUser.email;
        }

        function showPage(p) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('profile-view').classList.add('hidden');
            document.getElementById(p + '-view').classList.remove('hidden');
        }

        function logout() {
            localStorage.removeItem('savageSession');
            location.reload();
        }
    </script>
</body>
</html>
