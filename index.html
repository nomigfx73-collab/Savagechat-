<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SavageChat | Elite</title>
    <style>
        :root { --accent: #00d4ff; --dark: #0b1014; --card: #1c2229; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* App Layout */
        .header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .coins-display { background: rgba(255,170,0,0.1); color: #ffaa00; padding: 5px 12px; border-radius: 20px; border: 1px solid #ffaa00; font-weight: bold; }

        /* Chat Window */
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 2000; display: flex; flex-direction: column; }
        .chat-msgs { flex: 1; padding: 15px; overflow-y: auto; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; }
        .m { max-width: 75%; padding: 10px 14px; border-radius: 18px; margin-bottom: 10px; font-size: 14px; position: relative; }
        .m.bot { background: var(--card); align-self: flex-start; border-bottom-left-radius: 2px; }
        .m.user { background: var(--accent); color: black; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }

        /* Voice Note Style */
        .voice-btn { background: #333; color: var(--accent); border: none; padding: 5px 10px; border-radius: 10px; font-size: 12px; cursor: pointer; margin-top: 5px; }

        /* Footer Nav */
        .footer { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .tab { color: #888; text-align: center; font-size: 11px; cursor: pointer; }
        .tab.active { color: var(--accent); }

        .btn-send { background: var(--accent); border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; }
        input { background: #12181f; border: none; color: white; padding: 12px; border-radius: 25px; flex: 1; }
    </style>
</head>
<body onload="initApp()">

    <div id="main-app">
        <div class="header">
            <span id="tab-title" style="font-weight:bold; letter-spacing:1px;">EXPLORE</span>
            <div class="coins-display">🪙 <span id="user-coins">500</span></div>
        </div>

        <div id="home-tab">
            <div style="padding:15px; background:var(--card); margin:15px; border-radius:20px; text-align:center; border: 1px solid #333;">
                <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=500" style="width:100%; border-radius:15px; height:300px; object-fit:cover;">
                <h2 style="margin:10px 0;">Zoya AI <small style="color:#00ff44; font-size:12px;">● Online</small></h2>
                <button onclick="openChat('Zoya AI')" style="width:100%; padding:12px; border-radius:25px; background:var(--accent); border:none; font-weight:bold;">START FREE CHAT</button>
            </div>
        </div>

        <div id="profile-tab" class="hidden" style="text-align:center; padding:30px;">
            <div style="width:100px; height:100px; background:var(--accent); border-radius:50%; margin:0 auto; line-height:100px; font-size:40px; color:black;">👤</div>
            <h2 id="display-name" style="margin-top:15px;"></h2>
            <p style="color:var(--accent);">Savage Leader 👑</p>
            <div style="background:var(--card); padding:20px; border-radius:15px; margin-top:20px; text-align:left;">
                <p>Wallet Balance: <span style="float:right; color:#ffaa00;">🪙 <span id="p-coins">500</span></span></p>
                <button onclick="alert('Redirecting to Payment...')" style="width:100%; background:none; border:1px solid var(--accent); color:var(--accent); padding:10px; border-radius:10px; margin-top:10px;">TOP UP COINS</button>
            </div>
        </div>

        <div id="chat-window" class="hidden">
            <div class="header">
                <button onclick="closeChat()" style="background:none; border:none; color:var(--accent); font-size:20px;">←</button>
                <b id="cw-name">Zoya AI</b>
                <span style="font-size:10px; color:#00ff44;">● Active</span>
            </div>
            <div class="chat-msgs" id="chat-box"></div>
            <div id="typing" style="padding:5px 20px; color:var(--accent); font-size:11px;" class="hidden">Zoya is typing...</div>
            <div style="background:var(--card); padding:10px; display:flex; gap:10px; align-items:center;">
                <input type="text" id="m-input" placeholder="Type a message...">
                <button class="btn-send" onclick="sendMsg()">➔</button>
            </div>
        </div>

        <div class="footer">
            <div class="tab active" id="b-home" onclick="switchTab('home')">🔭<br>Explore</div>
            <div class="tab" id="b-profile" onclick="switchTab('profile')">👤<br>Account</div>
        </div>
    </div>

    <script>
        let coins = parseInt(localStorage.getItem('s_coins')) || 500;
        
        function initApp() {
            const user = localStorage.getItem('s_user') || "Savage User";
            document.getElementById('display-name').innerText = user;
            updateCoinUI();
        }

        function updateCoinUI() {
            document.getElementById('user-coins').innerText = coins;
            document.getElementById('p-coins').innerText = coins;
            localStorage.setItem('s_coins', coins);
        }

        function switchTab(t) {
            document.getElementById('home-tab').classList.toggle('hidden', t !== 'home');
            document.getElementById('profile-tab').classList.toggle('hidden', t !== 'profile');
            document.getElementById('tab-title').innerText = t.toUpperCase();
        }

        function openChat(name) {
            document.getElementById('chat-window').classList.remove('hidden');
            const box = document.getElementById('chat-box');
            if(box.innerHTML === "") {
                box.innerHTML = `<div class="m bot">Hi dear! I was waiting for you. ❤️<br><button class="voice-btn" onclick="playVoice()">▶ Listen Voice</button></div>`;
            }
        }

        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }

        function sendMsg() {
            const input = document.getElementById('m-input');
            if(!input.value) return;
            if(coins < 10) return alert("Insufficient Coins! Please Recharge.");

            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="m user">${input.value}</div>`;
            
            // Coin Deduction Logic
            coins -= 10;
            updateCoinUI();
            
            input.value = "";
            box.scrollTop = box.scrollHeight;

            // AI Reply Logic
            document.getElementById('typing').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('typing').classList.add('hidden');
                box.innerHTML += `<div class="m bot">Aww, you're so sweet! But to see my private photos, you need 1000 coins. Want to see? 🔥</div>`;
                box.scrollTop = box.scrollHeight;
            }, 2000);
        }

        function playVoice() {
            alert("Voice Note: 'Hey Savage! How are you? I'm feeling bored, let's talk!'");
        }
    </script>
</body>
</html>
