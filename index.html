<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavageChat | Professional Dashboard</title>
    <style>
        body { background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; }
        .hidden { display: none !important; }
        
        /* Nav & Headers */
        .nav { background: #1c1f26; padding: 15px; border-bottom: 2px solid #00d4ff; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .tab-header { display: flex; background: #1c1f26; border-bottom: 1px solid #333; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #888; font-weight: bold; }
        .tab.active { color: #00d4ff; border-bottom: 3px solid #00d4ff; }

        /* Inbox Style */
        .chat-list { padding: 10px; }
        .chat-item { display: flex; align-items: center; padding: 15px; background: #1c1f26; border-radius: 15px; margin-bottom: 10px; cursor: pointer; border: 1px solid #333; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background-size: cover; position: relative; border: 2px solid #00d4ff; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #00ff44; border-radius: 50%; border: 2px solid #1c1f26; }
        .chat-info { flex: 1; margin-left: 15px; }
        .chat-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .chat-preview { font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .chat-time { font-size: 10px; color: #555; text-align: right; }

        /* General UI */
        .auth-box { text-align: center; padding: 50px 20px; min-height: 100vh; }
        input, select { width: 90%; max-width: 300px; padding: 12px; margin: 10px auto; border-radius: 10px; background: #1c1f26; color: white; border: 1px solid #333; }
        .btn-main { background: #00d4ff; color: black; border: none; padding: 15px 40px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1c1f26; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .card { background: #1c1f26; border-radius: 15px; margin: 15px; overflow: hidden; }
        img { width: 100%; height: 250px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-box">
        <h1 style="color:#00d4ff;">SAVAGE CHAT</h1>
        <input type="text" id="name" placeholder="Full Name">
        <input type="number" id="age" placeholder="Age (18+)">
        <select id="role">
            <option value="gifter">Male (Gifter)</option>
            <option value="earner">Female (Earner)</option>
        </select>
        <button class="btn-main" onclick="startApp()">Start Chatting</button>
    </div>

    <div id="app-screen" class="hidden">
        <div class="nav">
            <span id="user-display" style="font-weight:bold;">SAVAGE</span>
            <div style="background:#ffaa00; color:black; padding:5px 12px; border-radius:20px; font-weight:bold; font-size:12px;">🪙 0</div>
        </div>

        <div class="tab-header">
            <div id="tab-home" class="tab active" onclick="showSection('home')">Home</div>
            <div id="tab-inbox" class="tab" onclick="showSection('inbox')">Inbox</div>
        </div>

        <div id="home-section">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=500">
                <div style="padding:15px;">
                    <h3>Zoya AI</h3>
                    <button style="width:100%; background:#ff0055; border:none; padding:12px; color:white; font-weight:bold; border-radius:10px;">VIDEO CALL</button>
                </div>
            </div>
        </div>

        <div id="inbox-section" class="hidden">
            <div class="chat-list">
                <div class="chat-item" onclick="alert('System: Please recharge to reply')">
                    <div class="avatar" style="background-image: url('https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=100');"><div class="online-dot"></div></div>
                    <div class="chat-info">
                        <div class="chat-name">Zoya AI (Online)</div>
                        <div class="chat-preview">Hey baby! Aapne message nahi kiya? Main intezaar kar rahi hoon... 💋</div>
                    </div>
                    <div class="chat-time">2m ago</div>
                </div>

                <div class="chat-item" onclick="alert('System: Please recharge to reply')">
                    <div class="avatar" style="background-image: url('https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=100');"><div class="online-dot"></div></div>
                    <div class="chat-info">
                        <div class="chat-name">Sara Malik</div>
                        <div class="chat-preview">Are you free for a private video call? I have a surprise... 😉</div>
                    </div>
                    <div class="chat-time">1h ago</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function startApp() {
            let name = document.getElementById('name').value;
            let age = document.getElementById('age').value;
            if(name === "" || age < 18) { alert("Invalid details!"); return; }
            
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('user-display').innerText = name.toUpperCase();
        }

        function showSection(section) {
            document.getElementById('home-section').classList.add('hidden');
            document.getElementById('inbox-section').classList.add('hidden');
            document.getElementById('tab-home').classList.remove('active');
            document.getElementById('tab-inbox').classList.remove('active');

            document.getElementById(section + '-section').classList.remove('hidden');
            document.getElementById('tab-' + section).classList.add('active');
        }
    </script>
</body>
</html>
