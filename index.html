<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Savage App Pro</title>
    <style>
        :root { --accent: #00d4ff; --dark: #0b1014; --card: #1c2229; --green: #25d366; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Header & Coins */
        .header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .coin-box { background: rgba(255,170,0,0.1); color: #ffaa00; padding: 5px 12px; border-radius: 20px; border: 1px solid #ffaa00; font-weight: bold; font-size: 14px; }

        /* Home: Live Streams & FB Posts */
        .live-tray { display: flex; overflow-x: auto; padding: 10px; gap: 10px; background: #0e141a; border-bottom: 1px solid #222; }
        .live-user { min-width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ff0055; padding: 2px; position: relative; }
        .live-user img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .live-label { position: absolute; bottom: -5px; left: 20%; background: #ff0055; font-size: 8px; padding: 2px 5px; border-radius: 4px; font-weight: bold; }

        .post { background: var(--card); margin: 10px; border-radius: 12px; border: 1px solid #333; overflow: hidden; }
        .post-img { width: 100%; height: auto; display: block; }
        .post-btns { padding: 12px; display: flex; gap: 15px; border-top: 1px solid #2a323d; }
        .btn-act { background: none; border: none; color: #888; font-size: 14px; display: flex; align-items: center; gap: 5px; cursor: pointer; }

        /* Service Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .card { background: var(--card); padding: 25px 10px; border-radius: 12px; text-align: center; border: 1px solid #333; cursor: pointer; }
        .card:active { background: #2a323d; }

        /* Real Chat System */
        .win { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 2000; display: flex; flex-direction: column; }
        .msgs { flex: 1; padding: 15px; overflow-y: auto; background: #0b1014; display: flex; flex-direction: column; }
        .msg { max-width: 75%; padding: 10px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; }
        .msg.u { align-self: flex-end; background: var(--accent); color: black; font-weight: bold; }
        .msg.b { align-self: flex-start; background: var(--card); color: white; border-left: 3px solid var(--accent); }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .tab { color: #888; text-align: center; font-size: 11px; flex: 1; cursor: pointer; }
        .tab.active { color: var(--accent); }
    </style>
</head>
<body onload="checkLogin()">

    <div id="login-pg" style="text-align:center; padding-top:100px;">
        <h1 style="color:var(--accent);">SAVAGE CHAT</h1>
        <input type="text" id="name-in" placeholder="Username" style="padding:15px; width:80%; border-radius:10px; background:var(--card); border:1px solid #333; color:white;"><br><br>
        <button onclick="doLogin()" style="padding:15px 60px; border-radius:30px; background:var(--accent); border:none; font-weight:bold;">LOGIN</button>
    </div>

    <div id="app" class="hidden">
        <div class="header">
            <b id="page-title">SAVAGE APP</b>
            <div class="coin-box">🪙 <span id="c-count">500</span></div>
        </div>

        <div id="p-home">
            <div class="live-tray">
                <div class="live-user" onclick="alert('Starting Video Call...')"><img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=100"><span class="live-label">LIVE</span></div>
                <div class="live-user"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100"><span class="live-label">LIVE</span></div>
            </div>
            <div class="post">
                <div style="padding:10px;"><b>Zoya AI</b> <small style="color:var(--accent);">● Official</small></div>
                <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=600" class="post-img">
                <div class="post-btns">
                    <button class="btn-act" onclick="this.style.color='#00d4ff'">👍 Like</button>
                    <button class="btn-act" onclick="openChat('Zoya AI')">💬 Comment</button>
                </div>
            </div>
        </div>

        <div id="p-service" class="hidden">
            <div class="grid">
                <div class="card" onclick="startVcall()">📹<br>Paid V-Call</div>
                <div class="card" onclick="window.open('https://wa.me/yournumber','_blank')">💬<br>WhatsApp</div>
                <div class="card" onclick="showTopup()">💰<br>Topup</div>
                <div class="card" onclick="downloadAPK()">📥<br>Get APK</div>
            </div>
        </div>

        <div id="p-inbox" class="hidden">
            <div style="padding:15px; border-bottom:1px solid #333;" onclick="openChat('Zoya AI')">
                <b>Zoya AI (Human Reply)</b><br><small style="color:#888;">Nomi, where are you?</small>
            </div>
        </div>

        <div id="p-account" class="hidden" style="text-align:center; padding:30px;">
            <img id="u-dp" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--accent); object-fit:cover;">
            <h2 id="u-name"></h2>
            <p style="color:var(--accent);">Savage Leader 👑</p>
            <button onclick="logout()" style="color:#ff4444; background:none; border:none; margin-top:50px;">Logout & Clear Info</button>
        </div>

        <div id="chat-win" class="win hidden">
            <div class="header">
                <button onclick="closeChat()" style="background:none; border:none; color:var(--accent); font-size:20px;">←</button>
                <b id="c-title">Chat</b>
                <span style="font-size:10px; color:#00ff44;">● ONLINE</span>
            </div>
            <div class="msgs" id="m-box"></div>
            <div style="background:var(--card); padding:10px; display:flex; gap:10px;">
                <input type="text" id="m-in" placeholder="Message..." style="flex:1; background:#12181f; border:none; color:white; padding:12px; border-radius:20px;">
                <button onclick="send()" style="background:var(--accent); border:none; border-radius:50%; width:45px; height:45px;">➔</button>
            </div>
        </div>

        <div class="footer">
            <div class="tab active" id="t-home" onclick="nav('home')">🏠<br>Home</div>
            <div class="tab" id="t-serv" onclick="nav('service')">🛠️<br>Service</div>
            <div class="tab" id="t-inbx" onclick="nav('inbox')">💬<br>Inbox</div>
            <div class="tab" id="t-acnt" onclick="nav('account')">👤<br>Account</div>
        </div>
    </div>

    <script>
        let coins = parseInt(localStorage.getItem('s_coins')) || 500;

        function checkLogin() {
            const u = localStorage.getItem('s_user');
            if(u) {
                document.getElementById('login-pg').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('u-name').innerText = u;
                updateC();
            }
        }

        function doLogin() {
            const n = document.getElementById('name-in').value;
            if(!n) return alert("Enter Name");
            localStorage.setItem('s_user', n);
            location.reload();
        }

        function updateC() {
            document.getElementById('c-count').innerText = coins;
            localStorage.setItem('s_coins', coins);
        }

        function nav(t) {
            ['home','service','inbox','account'].forEach(id => document.getElementById('p-'+id).classList.add('hidden'));
            document.getElementById('p-'+t).classList.remove('hidden');
            document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
            document.getElementById('t-'+t.substring(0,4)).classList.add('active');
            document.getElementById('page-title').innerText = t.toUpperCase();
        }

        function openChat(n) {
            document.getElementById('chat-win').classList.remove('hidden');
            document.getElementById('c-title').innerText = n;
            const b = document.getElementById('m-box');
            if(b.innerHTML === "") b.innerHTML = `<div class="msg b">Hi Savage! How are you? ❤️</div>`;
        }
        function closeChat() { document.getElementById('chat-win').classList.add('hidden'); }

        function send() {
            const i = document.getElementById('m-in');
            if(!i.value) return;
            if(coins < 10) return alert("No Coins!");
            const b = document.getElementById('m-box');
            b.innerHTML += `<div class="msg u">${i.value}</div>`;
            coins -= 10; updateC(); i.value = "";
            b.scrollTop = b.scrollHeight;
            setTimeout(() => { 
                b.innerHTML += `<div class="msg b">That's savage! Recharge to continue. 😉</div>`; 
                b.scrollTop = b.scrollHeight;
            }, 1000);
        }

        function startVcall() {
            if(coins < 200) return alert("Need 200 coins for V-Call!");
            coins -= 200; updateC();
            alert("Connecting to Random Private Video Call...");
        }

        function showTopup() { alert("Easypaisa/JazzCash Gateway: 0300XXXXXXX"); }
        function downloadAPK() { window.open('https://example.com/savage.apk','_blank'); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
