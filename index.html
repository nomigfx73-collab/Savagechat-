<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavageChat | Secured Permissions</title>
    <style>
        body { background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; }
        .hidden { display: none !important; }
        .nav { background: #1c1f26; padding: 15px; border-bottom: 2px solid #00d4ff; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .stat-card { background: linear-gradient(135deg, #1c1f26, #111); padding: 20px; border-radius: 15px; margin: 15px; border: 1px solid #333; }
        input, select, textarea { width: 90%; max-width: 300px; padding: 12px; margin: 10px auto; border-radius: 10px; background: #1c1f26; color: white; border: 1px solid #444; display: block; }
        .btn-action { background: #00d4ff; color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .perm-status { font-size: 11px; margin-top: 10px; color: #ffaa00; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1c1f26; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
    </style>
</head>
<body onload="checkLogin()">

    <div id="auth-screen" style="text-align:center; padding-top:60px;">
        <h2 style="color:#00d4ff;">SAVAGE CHAT</h2>
        <input type="text" id="uname" placeholder="Full Name">
        <select id="urole">
            <option value="gifter">I am a Boy (Gifter)</option>
            <option value="earner">I am a Girl (Earner)</option>
        </select>
        <button class="btn-action" onclick="login()">Create Account</button>
        <p style="font-size: 10px; color: #888; margin-top: 20px;">By joining, you allow Microphone & Camera access.</p>
    </div>

    <div id="app-screen" class="hidden">
        <div class="nav">
            <span id="name-tag" style="font-weight:bold; color:#00d4ff;"></span>
            <button onclick="logout()" style="background:none; border:none; color:#ff0055; font-size:12px;">Logout</button>
        </div>

        <div id="home-view">
            <div class="stat-card" style="border: 1px solid #00ff44;">
                <h4 style="margin:0; color:#00ff44;">System Permissions</h4>
                <p style="font-size:12px; color:#aaa;">Enable all for smooth Video Calls</p>
                <div id="perm-list" style="text-align:left; font-size:13px;">
                    🎤 Mic: <span id="mic-st">Checking...</span><br>
                    📷 Camera: <span id="cam-st">Checking...</span><br>
                    📍 Location: <span id="loc-st">Checking...</span>
                </div>
                <button class="btn-action" style="font-size:12px;" onclick="requestAllPermissions()">Allow All Permissions</button>
            </div>

            <div id="user-stats" class="stat-card" style="text-align:center;">
                <p>Welcome to Savage World</p>
                <button class="btn-action" onclick="showPage('profile')">My Profile</button>
            </div>
        </div>

        <div id="profile-view" class="hidden">
            <div style="text-align:center; padding:20px;">
                <h3>Profile Details</h3>
                <textarea id="edit-bio" placeholder="Bio"></textarea>
                <button class="btn-action" onclick="saveProfile()">Save</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div onclick="showPage('home')">🏠 Home</div>
            <div onclick="alert('Chat Active')">💬 Inbox</div>
            <div onclick="showPage('profile')">👤 Profile</div>
        </div>
    </div>

    <script>
        let userData = {};

        function checkLogin() {
            const savedUser = localStorage.getItem('savageUser');
            if (savedUser) {
                userData = JSON.parse(savedUser);
                loadApp();
            }
        }

        function login() {
            let name = document.getElementById('uname').value;
            let role = document.getElementById('urole').value;
            if(!name) return;
            userData = { name: name, role: role, bio: "Available" };
            localStorage.setItem('savageUser', JSON.stringify(userData));
            loadApp();
        }

        function loadApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('name-tag').innerText = userData.name.toUpperCase();
            requestAllPermissions();
        }

        async function requestAllPermissions() {
            try {
                // Mic & Camera Permission
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                document.getElementById('mic-st').innerText = "✅ Allowed";
                document.getElementById('cam-st').innerText = "✅ Allowed";
                // Speaker auto access with audio
                
                // Location Permission
                navigator.geolocation.getCurrentPosition(() => {
                    document.getElementById('loc-st').innerText = "✅ Allowed";
                }, () => {
                    document.getElementById('loc-st').innerText = "❌ Denied";
                });

                // Stop stream after check
                stream.getTracks().forEach(track => track.stop());

            } catch (err) {
                document.getElementById('mic-st').innerText = "❌ Denied";
                document.getElementById('cam-st').innerText = "❌ Denied";
                alert("Please enable Camera & Mic in Browser Settings for Video Calls.");
            }
        }

        function showPage(p) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('profile-view').classList.add('hidden');
            document.getElementById(p + '-view').classList.remove('hidden');
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
