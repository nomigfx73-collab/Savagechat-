<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Savage Super App</title>
    <style>
        :root { --accent: #00d4ff; --dark: #0b1014; --card: #1c2229; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding-bottom: 75px; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Header */
        .header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .coins-badge { background: rgba(255,170,0,0.1); color: #ffaa00; padding: 5px 12px; border-radius: 20px; border: 1px solid #ffaa00; font-weight: bold; }

        /* Live Stream Section (Home) */
        .live-scroll { display: flex; overflow-x: auto; padding: 10px; gap: 10px; background: #12181f; }
        .live-circle { min-width: 70px; height: 70px; border-radius: 50%; border: 2px solid #ff0055; padding: 2px; position: relative; }
        .live-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .live-tag { position: absolute; bottom: 0; left: 15%; background: #ff0055; font-size: 8px; padding: 2px 5px; border-radius: 5px; }

        /* Posts Section */
        .post { background: var(--card); border-radius: 15px; margin: 15px; overflow: hidden; border: 1px solid #333; }
        .post-img { width: 100%; height: auto; display: block; }
        .post-actions { padding: 12px; display: flex; gap: 20px; border-top: 1px solid #2a323d; }
        .action-btn { background: none; border: none; color: #888; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 14px; }

        /* Services Grid */
        .grid-services { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .s-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .tab { color: #888; text-align: center; font-size: 11px; cursor: pointer; }
        .tab.active { color: var(--accent); }

        /* Windows */
        .full-win { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 2000; display: flex; flex-direction: column; }
        .chat-msgs { flex: 1; padding: 15px; overflow-y: auto; background: #0b1014; display: flex; flex-direction: column; }
        .m.user { align-self: flex-end; background: var(--accent); color: black; padding: 10px; border-radius: 10px; margin: 5px; }
        .m.bot { align-self: flex-start; background: var(--card); padding: 10px; border-radius: 10px; margin: 5px; }
    </style>
</head>
<body onload="init()">

    <div id="app-main" class="hidden">
        <div class="header">
            <span id="nav-title">SAVAGE APP</span>
            <div class="coins-badge">🪙 <span id="coin-val">500</span></div>
        </div>

        <div id="tab-home">
            <div class="live-scroll">
                <div class="live-circle" onclick="startVcall()"><img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=100"><span class="live-tag">LIVE</span></div>
                <div class="live-circle"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100"><span class="live-tag">LIVE</span></div>
                <div class="live-circle"><img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=100"><span class="live-tag">LIVE</span></div>
            </div>

            <div class="post">
                <div style="padding:10px;"><b>Zoya AI</b> <small style="color:var(--accent);">● Official Post</small></div>
                <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=600" class="post-img">
                <div class="post-actions">
                    <button class="action-btn" onclick="this.style.color='#00d4ff'">👍 Like</button>
                    <button class="action-btn">💬 Comment</button>
                </div>
            </div>
        </div>

        <div id="tab-services" class="hidden">
            <div class="grid-services">
                <div class="s-card" onclick="alert('Searching Random Video Call...')">📹<br>Paid V-Call</div>
                <div class="s-card" onclick="location.href='https://wa.me/yournumber'">💬<br>WhatsApp</div>
                <div class="s-card" onclick="showTab('topup')">🪙<br>Topup</div>
                <div class="s-card" onclick="alert('Downloading APK...')">📥<br>Get APK</div>
            </div>
        </div>

        <div id="tab-inbox" class="hidden">
            <div style="padding:15px; border-bottom:1px solid #333;" onclick="openChat('Zoya AI')">
                <b>Zoya AI (Human Reply)</b><br><small style="color:#888;">Nomi, call me when free...</small>
            </div>
        </div>

        <div id="tab-profile" class="hidden" style="text-align:center; padding:20px;">
            <div style="position:relative; width:100px; margin:0 auto;">
                <img id="u-dp" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--accent);">
                <input type="file" id="dp-in" class="hidden" onchange="uploadDP(this)">
                <button onclick="document.getElementById('dp-in').click()" style="position:absolute; bottom:0; right:0; background:var(--accent); border:none; border-radius:50%; width:30px; height:30px;">📷</button>
            </div>
            <h2 id="u-name"></h2>
            <p>Savage Leader 👑</p>
            <button class="btn-main" onclick="logout()" style="background:#ff4444; color:white;">LOGOUT & RESET</button>
        </div>

        <div id="chat-win" class="full-win hidden">
            <div class="header">
                <button onclick="closeChat()" style="background:none; border:none; color:var(--accent); font-size:20px;">←</button>
                <b id="chat-title"></b>
                <span></span>
            </div>
            <div class="chat-msgs" id="chat-box"></div>
            <div style="background:var(--card); padding:10px; display:flex; gap:10px;">
                <input type="text" id="msg-in" placeholder="Free Chat..." style="flex:1; background:#12181f; color:white; border:none; padding:10px; border-radius:20px;">
                <button onclick="sendMsg()" style="background:var(--accent); border:none; border-radius:50%; width:40px; height:40px;">➔</button>
            </div>
        </div>

        <div class="footer">
            <div class="tab active" id="f-home" onclick="showTab('home')">🏠<br>Home</div>
            <div class="tab" id="f-serv" onclick="showTab('services')">🛠️<br>Service</div>
            <div class="tab" id="f-inbox" onclick="showTab('inbox')">💬<br>Inbox</div>
            <div class="tab" id="f-prof" onclick="showTab('profile')">👤<br>Account</div>
        </div>
    </div>

    <div id="login-screen" style="text-align:center; padding-top:100px;">
        <h1 style="color:var(--accent);">SAVAGE LOGIN</h1>
        <input type="text" id="login-name" placeholder="Username" style="padding:12px; width:80%; border-radius:10px; background:#1c2229; border:1px solid #333; color:white;"><br><br>
        <button onclick="login()" style="padding:12px 50px; border-radius:25px; background:var(--accent); border:none; font-weight:bold;">ENTER</button>
    </div>

    <script>
        let coins = parseInt(localStorage.getItem('s_coins')) || 500;

        function init() {
            const user = localStorage.getItem('s_user');
            if(user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-main').classList.remove('hidden');
                document.getElementById('u-name').innerText = user;
                const dp = localStorage.getItem('s_dp');
                if(dp) document.getElementById('u-dp').src = dp;
                updateUI();
            }
        }

        function login() {
            const n = document.getElementById('login-name').value;
            if(!n) return alert("Enter Name");
            localStorage.setItem('s_user', n);
            location.reload();
        }

        function updateUI() {
            document.getElementById('coin-val').innerText = coins;
            localStorage.setItem('s_coins', coins);
        }

        function showTab(t) {
            ['home','services','inbox','profile'].forEach(id => document.getElementById('tab-'+id).classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
            document.getElementById('f-'+t.substring(0,4)).classList.add('active');
        }

        function openChat(n) {
            document.getElementById('chat-win').classList.remove('hidden');
            document.getElementById('chat-title').innerText = n;
        }
        function closeChat() { document.getElementById('chat-win').classList.add('hidden'); }

        function sendMsg() {
            const i = document.getElementById('msg-in');
            if(!i.value) return;
            const b = document.getElementById('chat-box');
            b.innerHTML += `<div class="m user">${i.value}</div>`;
            coins -= 5; updateUI(); i.value = "";
            setTimeout(() => { b.innerHTML += `<div class="m bot">Hi! I am real human agent. How can I help?</div>`; }, 1000);
        }

        function startVcall() {
            if(coins < 100) return alert("Need 100 coins for Video Call!");
            alert("Connecting to random video call...");
            coins -= 100; updateUI();
        }

        function uploadDP(input) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = e => {
                    document.getElementById('u-dp').src = e.target.result;
                    localStorage.setItem('s_dp', e.target.result);
                };
                r.readAsDataURL(input.files[0]);
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
