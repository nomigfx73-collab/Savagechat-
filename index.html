<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavageChat | Official Fix</title>
    <style>
        body { background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; min-height: 100vh; }
        .hidden { display: none !important; }
        .nav { background: #1c1f26; padding: 15px; border-bottom: 2px solid #00d4ff; display: flex; justify-content: space-between; align-items: center; }
        .stat-card { background: #1c1f26; padding: 20px; border-radius: 15px; margin: 15px; border: 1px solid #333; text-align: center; }
        input, select, textarea { width: 90%; max-width: 300px; padding: 12px; margin: 10px auto; border-radius: 10px; background: #0b0e14; color: white; border: 1px solid #444; display: block; }
        .btn-action { background: #00d4ff; color: black; border: none; padding: 12px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1c1f26; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .post-card { background: #1c1f26; border-radius: 15px; margin: 15px; border: 1px solid #333; padding: 15px; }
    </style>
</head>
<body onload="checkLogin()">

    <div id="auth-screen" style="text-align:center; padding-top:100px;">
        <h2 style="color:#00d4ff;">SAVAGE CHAT</h2>
        <input type="text" id="uname" placeholder="Enter Full Name">
        <select id="urole">
            <option value="gifter">Male (Gifter)</option>
            <option value="earner">Female (Earner)</option>
        </select>
        <button class="btn-action" onclick="login()">Enter App</button>
    </div>

    <div id="app-screen" class="hidden">
        <div class="nav">
            <span id="name-tag" style="font-weight:bold; color:#00d4ff;">SAVAGE</span>
            <button onclick="logout()" style="background:none; border:none; color:#ff0055; font-size:12px;">Logout</button>
        </div>

        <div id="home-view">
            <div class="stat-card">
                <h3>Welcome Back!</h3>
                <p id="user-bio" style="color:#aaa;">Savage World is live.</p>
                <button class="btn-action" onclick="showPage('profile')">Edit Profile</button>
            </div>
            
            <div id="feed-container">
                <div class="post-card">
                    <b>Zoya AI</b>
                    <p>Hamari chat hamesha free rahegi! ❤️</p>
                </div>
            </div>
        </div>

        <div id="profile-view" class="hidden" style="text-align:center; padding:20px;">
            <h3>Profile Settings</h3>
            <textarea id="edit-bio" placeholder="Update your Bio..."></textarea>
            <button class="btn-action" onclick="saveProfile()">Save Changes</button>
        </div>

        <div class="bottom-nav">
            <div onclick="showPage('home')">🏠 Home</div>
            <div onclick="showPage('profile')">👤 Profile</div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const user = localStorage.getItem('savageUser');
            if (user) { loadApp(JSON.parse(user)); }
        }

        function login() {
            let name = document.getElementById('uname').value;
            let role = document.getElementById('urole').value;
            if(!name) return alert("Enter Name!");
            let data = { name: name, role: role, bio: "Available" };
            localStorage.setItem('savageUser', JSON.stringify(data));
            loadApp(data);
        }

        function loadApp(data) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('name-tag').innerText = data.name.toUpperCase();
            document.getElementById('user-bio').innerText = data.bio;
        }

        function showPage(p) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('profile-view').classList.add('hidden');
            document.getElementById(p + '-view').classList.remove('hidden');
        }

        function saveProfile() {
            let bio = document.getElementById('edit-bio').value;
            let data = JSON.parse(localStorage.getItem('savageUser'));
            data.bio = bio;
            localStorage.setItem('savageUser', JSON.stringify(data));
            alert("Saved!");
            showPage('home');
            loadApp(data);
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
    </html>
